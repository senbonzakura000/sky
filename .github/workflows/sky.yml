name: sky
on:
  # schedule:
  #   - cron: '*/30 * * * *'   # Runs every 30 minutes
  workflow_dispatch:          # Allows manual trigger from GitHub UI
jobs:
  curl-and-save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Curl URL and save file
        run: |
          curl -fsSL "${{ secrets.SKY }}" -o raw_sky.json

      - name: Strip sensitive fields from JSON
        run: |
          jq '[.[] | del(.drm_license_url, .drm_jwt_token, .embed_url)]' raw_sky.json > sky.json
          rm raw_sky.json

      - name: Commit and push file to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sky.json
          git diff --cached --quiet || git commit -m "chore: update sky.json [skip ci]"
          git push

      - name: Delete workflow run logs
        if: always()
        run: |
          RUN_ID="${{ github.run_id }}"
          REPO="${{ github.repository }}"
          curl -s -X DELETE \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${REPO}/actions/runs/${RUN_ID}"
